<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐷 {{blog[1]}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #FFE4E1 0%, #FFF0F5 50%, #FFB6C1 100%);
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: white;
            border-radius: 25px;
            text-decoration: none;
            color: #FF69B4;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
            transition: all 0.3s ease;
            border: 2px solid #FFB6C1;
        }

        .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.4);
        }

        h1 {
            font-size: 2.5em;
            color: #FF69B4;
            text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.3);
            margin-bottom: 20px;
        }

        .blog-meta {
            font-size: 1.1em;
            color: #DB7093;
            margin-bottom: 30px;
        }

        .blog-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.3);
            border: 3px solid #FFB6C1;
            line-height: 2;
            font-size: 1.2em;
            color: #555;
        }

        .blog-content p {
            margin-bottom: 20px;
            text-indent: 2em;
        }

        .blog-content::first-letter {
            font-size: 2.5em;
            color: #FF69B4;
            font-weight: bold;
            float: left;
            margin-right: 10px;
            line-height: 1;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #DB7093;
            font-size: 1.1em;
        }

        .pig-decoration {
            font-size: 4em;
            text-align: center;
            margin: 20px 0;
            animation: wiggle 1s ease infinite;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .decorations {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 3em;
            opacity: 0.5;
        }

        .decorations.right {
            left: auto;
            right: 20px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            .blog-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="decorations">🐷</div>
    <div class="decorations right">🌸</div>

    <div class="container">
        <header>
            <a href="/" class="back-link">← 返回博客列表</a>
            <h1>🐽 {{blog[1]}}</h1>
            <div class="blog-meta">
                <span>📅 {{blog[3]}}</span>
                <span style="margin: 0 10px;">|</span>
                <span>👤 小猪博主</span>
            </div>
        </header>

        <div class="blog-content">
            <p>{{blog[2]}}</p>
        </div>

        <div class="pig-decoration">🐷</div>

        <footer>
            <p>💕 感谢阅读 💕</p>
        </footer>
    </div>
</body>
</html>
