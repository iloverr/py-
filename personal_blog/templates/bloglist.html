<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐷 小猪的个人博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #FFE4E1 0%, #FFF0F5 50%, #FFB6C1 100%);
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3em;
            color: #FF69B4;
            text-shadow: 3px 3px 6px rgba(255, 105, 180, 0.3);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.3em;
            color: #DB7093;
            font-weight: bold;
        }

        .pig-icon {
            font-size: 2em;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .blog-list {
            display: grid;
            gap: 20px;
        }

        .blog-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.3);
            transition: all 0.3s ease;
            border: 3px solid #FFB6C1;
        }

        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(255, 105, 180, 0.4);
        }

        .blog-card h2 {
            color: #FF69B4;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .blog-card a {
            text-decoration: none;
            color: inherit;
        }

        .blog-card a:hover {
            text-decoration: underline;
        }

        .blog-date {
            font-size: 0.9em;
            color: #999;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #DB7093;
            font-size: 1.1em;
        }

        .footer p {
            margin-bottom: 10px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-links a {
            text-decoration: none;
            color: #FF69B4;
            font-size: 1.2em;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #FF1493;
        }

        .decorations {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 3em;
            opacity: 0.5;
        }

        .decorations.right {
            left: auto;
            right: 20px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }

            .blog-card {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="decorations">🐷</div>
    <div class="decorations right">🌸</div>

    <div class="container">
        <header>
            <div class="pig-icon">🐷</div>
            <h1>小猪的个人博客</h1>
            <p class="subtitle">记录小猪的美好生活 🐾</p>
        </header>

        <div class="blog-list">
            {% for blog in blogs %}
            <div class="blog-card">
                <h2><a href="/blog/{{blog[0]}}">🐽 {{blog[1]}}</a></h2>
                <p class="blog-date">📅 {{blog[3]}}</p>
            </div>
            {% endfor %}
        </div>

        <footer>
            <p>💕 感谢访问小猪的博客 💕</p>
            <div class="social-links">
                <a href="#">🐷</a>
                <a href="#">🌸</a>
                <a href="#">💖</a>
            </div>
        </footer>
    </div>
</body>
</html>
